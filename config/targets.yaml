# ─────────────────────────────────────────────────────────────
# BankWatch — monitored targets
#
# Seeded from the Point Maxing card database (data.js + card-assets.js),
# whose product URLs are bank-website sourced. Every domain here is a
# TRUSTED, human-approved official bank domain. Nothing outside this
# allowlist is ever fetched for data.
#
# To add a bank: add it under `issuers` with its official `domain`,
# the product `pages`, and a `listing` (card index) URL. A bank not on
# this list must be reviewed and approved first (see discovery candidates
# in the daily report).
# ─────────────────────────────────────────────────────────────

# Hosts that are allowed to be fetched. A fetch whose FINAL url (after
# redirects) is not under one of these hosts is rejected and flagged.
allowlist:
  - americanexpress.com
  - westpac.com.au
  - bankofmelbourne.com.au
  - anz.com.au
  - nab.com.au
  - commbank.com.au
  - qantasmoney.com
  - hsbc.com.au
  - bankwest.com.au
  - mycard.com.au

# Politeness / fetch behaviour
settings:
  user_agent: "BankWatch/1.0 (+https://pointmaxing.com.au; credit-card T&C change monitor; contact: hello@pointmaxing.com.au)"
  per_domain_delay_seconds: 6     # min gap between requests to the same host
  nav_timeout_seconds: 45
  retries: 3
  honour_robots: true
  follow_pdf_links: true           # discover & monitor same-domain .pdf links on each product page
  new_product_confirm_runs: 2      # a discovered card must persist this many runs before "confirmed new"

issuers:
